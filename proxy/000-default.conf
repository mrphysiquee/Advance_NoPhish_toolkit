Header unset ETag
             Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
             Header set Pragma "no-cache"
             Header set Expires "Wed, 12 Jan 1980 05:00:00 GMT"
	     
<VirtualHost *:80>

		RewriteEngine On
    		RewriteMap redirects txt:/tmp/redirects.txt
		RewriteCond ${redirects:%{REQUEST_URI}} ^(.+)$
		RewriteRule ^(.*)$ ${redirects:$1} [R,L]
		
		<Location /status.php>
		    Deny from all
		</Location>

		

	    	RewriteCond %{REQUEST_URI} /v1
	    	RewriteCond %{HTTP_USER_AGENT} "iPhone|Android|iPad"
    		RewriteRule ^/(.*) /miframe1.html [PT,L]

    		RewriteCond %{REQUEST_URI} /v1
    		RewriteCond %{HTTP_USER_AGENT} !(iPhone|Android|iPad)
    		RewriteRule ^/(.*) /iframe1.html [PT,L]
	    

        
	<Location /da327a91a194c84e0c28e6330b45>
	ProxyPass http://172.17.0.3:6901
	ProxyPassReverse http://172.17.0.3:6901
	</Location>
	<Location /da327a91a194c84e0c28e6330b45/websockify>
	ProxyPass ws://172.17.0.3:6901/websockify keepalive=On
	ProxyPassReverse ws://172.17.0.3:6901/websockify
	</Location>
	ProxyTimeout 600
	Timeout 600
	
        

	<Location /da327a91a194c84e0c28e6330b45>
	ProxyPass http://172.17.0.4:6901
	ProxyPassReverse http://172.17.0.4:6901
	</Location>
	<Location /da327a91a194c84e0c28e6330b45/websockify>
