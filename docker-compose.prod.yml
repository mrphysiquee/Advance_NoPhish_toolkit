version: '3.8'

services:
  # ===================
  # PostgreSQL Database
  # ===================
  postgres:
    image: postgres:15-alpine
    container_name: nophish-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nophish}
      POSTGRES_USER: ${POSTGRES_USER:-nophish_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nophish_user} -d ${POSTGRES_DB:-nophish}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nophish_network
    mem_limit: 512m
    cpus: 0.5

  # ===================
  # Redis Cache
  # ===================
  redis:
    image: redis:7-alpine
    container_name: nophish-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nophish_network
    mem_limit: 256m
    cpus: 0.25

  # ===================
  # Flask Admin Panel
  # ===================
  panel:
    build:
      context: .
      dockerfile: PANEL-Dockerfile
    container_name: nophish-panel
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nophish_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nophish}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-${SECRET_KEY}}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PANEL_DOMAIN=${PANEL_DOMAIN}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ./panel:/app
      - ./vnc:/app/vnc:ro
      - ./database:/app/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    networks:
      - nophish_network
    mem_limit: 1g
    cpus: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===================
  # Nginx Reverse Proxy
  # ===================
  nginx:
    build:
      context: .
      dockerfile: NGINX-Dockerfile
    container_name: nophish-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:ro
      - ./vnc:/usr/share/nginx/html/vnc:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - panel
    restart: unless-stopped
    networks:
      - nophish_network
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===================
  # Certbot (SSL Renewal)
  # ===================
  certbot:
    image: certbot/certbot:latest
    container_name: nophish-certbot
    volumes:
      - ./certbot-www:/var/www/certbot:rw
      - ./ssl:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - nophish_network

# ===================
# Networks
# ===================
networks:
  nophish_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ===================
# Volumes
# ===================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
